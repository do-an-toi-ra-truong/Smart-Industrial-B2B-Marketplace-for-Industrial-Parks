<!doctype html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Smart Industrial B2B | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="../src/css/adminlte.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        /* Modern Corporate Gradient Background */
        body.login-page {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        }
        /* Premium Card Styling */
        .premium-card {
            border-radius: 1.2rem;
            border: none;
            overflow: hidden;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.4) !important;
        }
        .login-logo a {
            color: #ffffff !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            font-weight: 700;
        }
        .form-control:focus, .form-select:focus {
            border-color: #0dcaf0;
            box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
        }
    </style>
</head>

<body class="login-page">
    <div class="login-box" style="width: 420px;">
        <div class="login-logo mb-4">
            <a href="#"><b>Smart</b>B2B Portal</a>
        </div>
        
        <div class="card premium-card">
            <div class="card-body login-card-body p-5">
                <h4 class="login-box-msg fw-bold text-dark mb-1 p-0">Welcome Back</h4>
                <p class="text-muted text-center mb-4 small">Please sign in to your employee account</p>

                <form id="loginForm">
                    <div class="input-group mb-4">
                        <div class="input-group-text bg-light border-end-0 text-primary"><i class="bi bi-envelope-fill"></i></div>
                        <input type="email" class="form-control border-start-0 ps-0" placeholder="Corporate Email Address" required>
                    </div>
                    
                    <div class="input-group mb-4">
                        <div class="input-group-text bg-light border-end-0 text-primary"><i class="bi bi-lock-fill"></i></div>
                        <input type="password" class="form-control border-start-0 ps-0" placeholder="Password" required>
                    </div>

                    <div class="input-group mb-4">
                        <div class="input-group-text bg-light border-end-0 text-primary"><i class="bi bi-person-badge-fill"></i></div>
                        <select id="roleSelect" class="form-select border-start-0 ps-0 text-secondary" required>
                            <option value="" disabled selected>Select your portal access...</option>
                            <option value="admin" class="text-dark">Company Admin (Manager)</option>
                            <option value="staff" class="text-dark">Buyer / Seller (Staff)</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted small" for="rememberMe">Remember Me</label>
                        </div>
                        <a href="#" class="text-primary text-decoration-none small fw-bold">Forgot Password?</a>
                    </div>

                    <div class="d-grid gap-2 mb-3">
                        <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm rounded-3">Sign In <i class="bi bi-box-arrow-in-right ms-1"></i></button>
                    </div>
                    
                    <div class="d-flex align-items-center my-3">
                        <hr class="flex-grow-1 text-muted">
                        <span class="mx-2 text-muted small">OR</span>
                        <hr class="flex-grow-1 text-muted">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="button" id="guestBtn" class="btn btn-outline-secondary py-2 fw-bold shadow-sm rounded-3">Continue as Guest <i class="bi bi-arrow-right-circle ms-1"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="../src/js/adminlte.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // --- LOGIN LOGIC (For Employees) ---
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const selectedRole = document.getElementById('roleSelect').value;

            // Beautiful Loading Animation for Employees
            Swal.fire({
                title: 'Authenticating...',
                html: 'Connecting securely to your portal.',
                timer: 1500,
                timerProgressBar: true,
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            }).then(() => {
                // REDIRECT LOGIC
                if (selectedRole === 'admin') {
                    window.location.href = './company-orders.html';
                } else if (selectedRole === 'staff') {
                    window.location.href = '../../../Front_End_Buyer/index.html'; 
                }
            });
        });

        // --- GUEST LOGIC (For Public Users) ---
        document.getElementById('guestBtn').addEventListener('click', function() {
            Swal.fire({
                title: 'Entering Marketplace...',
                html: 'Loading public guest access.',
                timer: 1200,
                timerProgressBar: true,
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            }).then(() => {
                // Route directly to the public buyer interface
                window.location.href = '../../../Front_End_Buyer/index.html'; 
            });
        });
    </script>
</body>
</html>
